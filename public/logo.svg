<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 110" fill="none">
  <!-- Globe oval bleu -->
  <ellipse cx="52" cy="55" rx="48" ry="36" fill="#1a3a8f"/>
  <ellipse cx="52" cy="55" rx="48" ry="36" fill="url(#globeGrad)" opacity="0.6"/>

  <!-- Document blanc -->
  <rect x="30" y="22" width="44" height="56" rx="4" fill="white" stroke="#1a3a8f" stroke-width="1.5"/>
  <rect x="36" y="34" width="32" height="3" rx="1.5" fill="#93c5fd"/>
  <rect x="36" y="42" width="28" height="3" rx="1.5" fill="#93c5fd"/>
  <rect x="36" y="50" width="24" height="3" rx="1.5" fill="#d1d5db"/>
  <rect x="36" y="58" width="20" height="3" rx="1.5" fill="#d1d5db"/>

  <!-- Symbole euro sur le document -->
  <text x="42" y="32" font-family="Arial" font-weight="900" font-size="14" fill="#1a3a8f">€</text>

  <!-- Ruban tricolore français (diagonale) -->
  <clipPath id="docClip">
    <rect x="30" y="22" width="44" height="56" rx="4"/>
  </clipPath>
  <g clip-path="url(#docClip)">
    <rect x="28" y="60" width="20" height="22" fill="#002395" opacity="0.7" transform="rotate(-15 38 71)"/>
    <rect x="44" y="60" width="20" height="22" fill="white" opacity="0.7" transform="rotate(-15 54 71)"/>
    <rect x="60" y="60" width="20" height="22" fill="#ED2939" opacity="0.7" transform="rotate(-15 70 71)"/>
  </g>

  <!-- Texte "Bulletin" en bleu -->
  <text x="112" y="58" font-family="Arial Black, Arial" font-weight="900" font-size="36" fill="#1a3a8f" letter-spacing="-1">Bulletin</text>
  <!-- Texte "Facile" en rouge -->
  <text x="112" y="95" font-family="Arial Black, Arial" font-weight="900" font-size="36" fill="#DC2626" letter-spacing="-1">Facile</text>

  <!-- Tagline -->
  <text x="113" y="108" font-family="Arial" font-size="11" fill="#9ca3af" font-style="italic">Le bulletin de paye plus facile que jamais</text>

  <defs>
    <radialGradient id="globeGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="white" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.2"/>
    </radialGradient>
  </defs>
</svg>
