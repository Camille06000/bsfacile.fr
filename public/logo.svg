<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 115" fill="none">
  <!-- Documents empilés (arrière - rouge) -->
  <rect x="8" y="18" width="52" height="68" rx="5" fill="#DC2626" opacity="0.85" transform="rotate(-6 34 52)"/>
  <!-- Documents empilés (avant - bleu) -->
  <rect x="14" y="14" width="52" height="68" rx="5" fill="white" stroke="#1a3a8f" stroke-width="2"/>
  <!-- Lignes sur le document -->
  <rect x="22" y="28" width="36" height="3" rx="1.5" fill="#DC2626" opacity="0.7"/>
  <rect x="22" y="36" width="32" height="3" rx="1.5" fill="#93c5fd"/>
  <rect x="22" y="44" width="28" height="3" rx="1.5" fill="#93c5fd"/>
  <rect x="22" y="52" width="24" height="3" rx="1.5" fill="#d1d5db"/>
  <!-- Euro sign -->
  <text x="19" y="30" font-family="Arial" font-weight="900" font-size="13" fill="#1a3a8f">€</text>
  <!-- Checkmark bleu -->
  <circle cx="52" cy="65" r="14" fill="#1a3a8f"/>
  <path d="M44 65 L50 71 L60 58" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Trait séparateur vertical -->
  <line x1="88" y1="10" x2="88" y2="105" stroke="#e5e7eb" stroke-width="1.5"/>

  <!-- "Bulletin" en bleu gras -->
  <text x="100" y="62" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="42" fill="#1a3a8f" letter-spacing="-1">Bulletin</text>
  <!-- "Facile" en rouge italique -->
  <text x="100" y="98" font-family="Georgia, serif" font-weight="700" font-size="38" fill="#DC2626" letter-spacing="-0.5" font-style="italic">Facile</text>

  <!-- Ligne de soulignement dégradé -->
  <line x1="100" y1="104" x2="448" y2="104" stroke="url(#lineGrad)" stroke-width="2"/>

  <!-- Tagline en italique blanc/gris -->
  <text x="101" y="113" font-family="Georgia, Arial" font-size="11.5" fill="#6b7280" font-style="italic">Le bulletin de paye plus facile que jamais</text>

  <defs>
    <linearGradient id="lineGrad" x1="100" y1="0" x2="448" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a3a8f"/>
      <stop offset="100%" stop-color="#DC2626"/>
    </linearGradient>
  </defs>
</svg>
